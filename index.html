<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>PV-Master: OVT Training</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --pol-blue: #004481; --gold: #ffcc00; --error: #dc3545; --ok: #28a745; --bg: #001d3d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { background: white; color: #333; padding: 2rem; border-radius: 12px; max-width: 1100px; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .header { border-bottom: 4px solid var(--pol-blue); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border-radius: 5px; font-weight: bold; color: #333; }
        .tab.active { background: var(--pol-blue); color: white; }
        .scenario-card { background: #e9ecef; border-left: 6px solid var(--gold); padding: 20px; margin-bottom: 15px; font-size: 1.1rem; font-style: italic; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 1rem; box-sizing: border-box; resize: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .feed-box { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; padding: 10px; }
        .peer-entry { background: white; padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #eee; font-size: 0.9rem; }
        .feedback { margin-top: 10px; padding: 15px; border-radius: 6px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .danger { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--pol-blue); color: white; }
        .btn-main:hover { opacity: 0.9; }
        .btn-next { background: var(--ok); color: white; width: 100%; margin-top: 10px; }
        .btn-reset { background: var(--error); color: white; margin-top: 20px; }
        .hidden { display: none; }
        .label-ovt { color: var(--pol-blue); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="main-title">PV-Trainer: <span style="color: var(--pol-blue)">OVT Meesterschap</span></h2>
        <div id="user-tag" style="font-weight: bold;">Stand-by</div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('student')">Student</div>
        <div class="tab" onclick="switchTab('teacher')">Docent</div>
    </div>

    <div id="student-view">
        <div id="auth-ui">
            <h3>Meld je aan voor de briefing</h3>
            <select id="class-select" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="Alfa">Alfa</option><option value="Bravo">Bravo</option>
                <option value="Charlie">Charlie</option><option value="Delta">Delta</option>
                <option value="Echo">Echo</option><option value="Foxtrot">Foxtrot</option>
                <option value="Golf">Golf</option><option value="Hotel">Hotel</option>
                <option value="Juliet">Juliet</option><option value="Kilo">Kilo</option>
                <option value="Lima">Lima</option><option value="Mike">Mike</option>
            </select>
            <input type="text" id="student-name" placeholder="Achternaam..." style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
            <button class="btn-main" onclick="startSession()">Start Training</button>
        </div>

        <div id="game-ui" class="hidden">
            <div class="grid">
                <div>
                    <div id="task-info" class="label-ovt">Wachten op docent...</div>
                    <div class="scenario-card" id="scenario-text">De docent start zo de volgende casus.</div>
                    <textarea id="user-input" placeholder="Zet de bovenstaande tekst om in een filmisch proces-verbaal (OVT)..." oninput="sendLiveUpdate()"></textarea>
                    <div id="feedback-box" class="feedback"></div>
                    <button class="btn-main" id="submit-btn" style="margin-top:10px; width: 100%;" onclick="validate()">Verbaal Definitief Inleveren</button>
                </div>
                <div>
                    <h4 style="margin-top:0">Live Feed (Geef elkaar feedback)</h4>
                    <div id="peer-feed" class="feed-box">Iedereen is nog aan het schrijven...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="teacher-view" class="hidden">
        <h3>Docenten Dashboard</h3>
        <p>Bedien welke casus de klas nu ziet:</p>
        <div id="teacher-controls">
            <button class="btn-main" onclick="changeTask(-1)">Vorige</button>
            <span id="current-task-num" style="font-weight: bold; margin: 0 15px;">Casus 1</span>
            <button class="btn-main" onclick="changeTask(1)">Volgende Casus</button>
        </div>
        <div id="casus-preview" style="margin-top:20px; padding:15px; background:#f0f4f8; border-radius:8px;"></div>
        <button class="btn-reset" onclick="resetClass()">Wis alle studentgegevens van deze klas</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBEod8zm1jvvkmPbe6cA_SQo2U_esC9yTY",
        authDomain: "aangiftebotje.firebaseapp.com",
        databaseURL: "https://aangiftebotje-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangiftebotje",
        storageBucket: "aangiftebotje.firebasestorage.app",
        messagingSenderId: "825633841222",
        appId: "1:825633841222:web:15d93d08e2b719285dea47"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let student = "", group = "", currentIdx = 0;

    // SCENARIO'S IN TEGENWOORDIGE TIJD
    const scenarios = [
        { q: "Ik hou de verdachte aan op de Hoogstraat. Ik zeg dat hij niet tot antwoorden verplicht is en recht heeft op een advocaat.", req: ["hield", "zeide", "verplicht", "raadsman"] },
        { q: "Ik zie dat de man de ruit van de bushok inslaat. Ik ren naar hem toe en breng hem naar de grond.", req: ["zag", "insloeg", "rende", "bracht"] },
        { q: "Tijdens de controle ruik ik een sterke henneplucht. Ik verzoek de bestuurder om de kofferbak te openen.", req: ["rook", "verzocht", "opende"] },
        { q: "De verdachte scheldt mij uit voor 'pannenkoek'. Ik voel mij in mijn eer aangetast en hou hem aan voor belediging.", req: ["schold", "voelde", "hield"] },
        { q: "Ik voel aan de buitenkant van de kleding van de verdachte. Ik zoek naar wapens voor mijn eigen veiligheid.", req: ["voelde", "zocht", "veiligheid"] },
        { q: "Ik zie dat de vrouw een parfumflesje in haar tas stopt zonder te betalen. Ik spreek haar aan bij de uitgang.", req: ["zag", "stopte", "sprak"] },
        { q: "De man geeft de omstander een harde klap met zijn vlakke hand. Het slachtoffer heeft veel pijn.", req: ["gaf", "had", "pijn"] },
        { q: "Ik vorder de man om weg te gaan bij het evenement. Hij negeert mijn bevel en blijft staan.", req: ["vorderde", "negeerde", "bleef"] },
        { q: "Ik tref de inbreker aan in de woning. Hij heeft een schroevendraaier in zijn linkerhand.", req: ["trof", "had"] },
        { q: "Ik hoor de verdachte zeggen dat hij de auto heeft gestolen. Ik noteer zijn verklaring direct.", req: ["hoorde", "noterde", "verklaarde"] }
    ];

    function switchTab(tab) {
        document.getElementById('student-view').classList.toggle('hidden', tab !== 'student');
        document.getElementById('teacher-view').classList.toggle('hidden', tab !== 'teacher');
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === tab));
        if(tab === 'teacher') updateTeacherPreview();
    }

    function startSession() {
        group = document.getElementById('class-select').value;
        student = document.getElementById('student-name').value.trim();
        if(!student) return alert("Voer je achternaam in.");
        
        document.getElementById('auth-ui').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('user-tag').innerText = `Agent: ${student} (${group})`;

        // Luister naar de docent voor de huidige casus
        db.ref(`session/${group}/current`).on('value', snap => {
            currentIdx = snap.val() || 0;
            loadTask();
        });

        // Luister naar de live feed van klasgenoten
        db.ref(`live/${group}`).on('value', snap => {
            renderPeerFeed(snap.val());
        });
    }

    function loadTask() {
        const s = scenarios[currentIdx];
        document.getElementById('task-info').innerText = `Casus ${currentIdx + 1} (Filmische OVT vereist)`;
        document.getElementById('scenario-text').innerText = s.q;
        // We resetten het invoerveld NIET automatisch om type-hinder te voorkomen bij sync, 
        // maar bij een nieuwe casus is het wel handig:
        if(window.lastLoadedIdx !== currentIdx) {
            document.getElementById('user-input').value = "";
            document.getElementById('feedback-box').style.display = "none";
            window.lastLoadedIdx = currentIdx;
        }
    }

    function sendLiveUpdate() {
        const text = document.getElementById('user-input').value;
        if(student && group) {
            db.ref(`live/${group}/${student}`).set({
                text: text,
                timestamp: Date.now()
            });
        }
    }

    function renderPeerFeed(data) {
        const container = document.getElementById('peer-feed');
        let html = "";
        for(let name in data) {
            if(name === student) continue;
            html += `<div class="peer-entry"><strong>${name}:</strong><br>${data[name].text}</div>`;
        }
        container.innerHTML = html || "Wachten op klasgenoten...";
    }

    function validate() {
        const val = document.getElementById('user-input').value.toLowerCase();
        const s = scenarios[currentIdx];
        
        // Check op verboden hulpwerkwoorden (VTT/TT indicatoren)
        const vttWords = ["heb ", "ben ", "is ", "heeft ", "wordt ", "worden "];
        const hasVTT = vttWords.some(w => val.includes(w));
        
        let missing = s.req.filter(r => !val.includes(r));
        const fb = document.getElementById('feedback-box');
        fb.style.display = "block";

        if(missing.length === 0 && !hasVTT) {
            fb.className = "feedback success";
            fb.innerHTML = "<strong>Correct!</strong> Je hebt de casus succesvol omgezet in een filmisch proces-verbaal (OVT).";
        } else {
            fb.className = "feedback danger";
            let msg = "<strong>Nog niet akkoord:</strong><br>";
            if(hasVTT) msg += "- Je gebruikt de tegenwoordige of voltooide tijd (heb/is/wordt). Gebruik alleen OVT.<br>";
            if(missing.length > 0) msg += "- Mis de kernwoorden in OVT: " + missing.join(", ") + ".";
            fb.innerHTML = msg;
        }
    }

    // DOCENT LOGICA
    function changeTask(dir) {
        group = document.getElementById('class-select').value;
        let newIdx = currentIdx + dir;
        if(newIdx < 0) newIdx = 0;
        if(newIdx >= scenarios.length) newIdx = scenarios.length - 1;
        
        db.ref(`session/${group}/current`).set(newIdx);
        updateTeacherPreview();
    }

    function updateTeacherPreview() {
        group = document.getElementById('class-select').value;
        db.ref(`session/${group}/current`).once('value', snap => {
            const idx = snap.val() || 0;
            document.getElementById('current-task-num').innerText = `Casus ${idx + 1}`;
            document.getElementById('casus-preview').innerText = scenarios[idx].q;
        });
    }

    function resetClass() {
        group = document.getElementById('class-select').value;
        if(confirm(`Weet je zeker dat je alle live-teksten van klas ${group} wilt wissen?`)) {
            db.ref(`live/${group}`).remove();
            db.ref(`session/${group}`).set({current: 0});
        }
    }
</script>

</body>
</html>
