<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Schrijftrainer: Redenen van Wetenschap</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #002344; color: white; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: white; color: #333; padding: 2rem; border-radius: 8px; width: 100%; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .instruction { background: #eef4f9; padding: 15px; border-left: 5px solid #004481; margin-bottom: 20px; font-size: 0.95rem; }
        .scenario { font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; color: #004481; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #004481; color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #002344; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .stats { margin-top: 10px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>PV Schrijftrainer</h2>
    <div class="instruction">
        <strong>Opdracht:</strong> Noteer je waarneming als reden van wetenschap. <br>
        Eis: Gebruik de <strong>ik-vorm</strong> en de <strong>verleden tijd (ovt)</strong>. Schrijf filmisch!
    </div>
    
    <div id="game-ui">
        <div class="stats">Situatie <span id="current-idx">1</span> van 30</div>
        <div class="scenario" id="scenario-text">Laden...</div>
        <input type="text" id="user-input" placeholder="Typ hier je PV-zin..." autocomplete="off">
        <button onclick="checkAnswer()">Verstuur Waarneming</button>
        
        <div id="feedback"></div>
        <button id="next-btn" style="display:none; margin-top:10px; background: #28a745;" onclick="nextQuestion()">Volgende situatie</button>
    </div>
</div>

<script>
    const exercises = [
        { q: "Je loopt langs een auto en ruikt een sterke wietlucht.", keywords: ["ik", "rook", "wietlucht"], example: "Ik rook dat er een sterke wietlucht uit de auto kwam." },
        { q: "Tijdens de veiligheidsfouillering voel je een hard voorwerp in de linker jaszak.", keywords: ["ik", "voelde", "voorwerp"], example: "Ik voelde dat er een hard voorwerp in de linker jaszak zat." },
        { q: "De verdachte spreekt je aan en je ruikt een sterke alcohollucht.", keywords: ["ik", "rook", "alcohollucht"], example: "Ik rook dat de adem van de verdachte naar alcohol rook." },
        { q: "Je ziet de verdachte een zilverkleurig voorwerp in de bosjes gooien.", keywords: ["ik", "zag", "gooide"], example: "Ik zag dat de verdachte een zilverkleurig voorwerp in de bosjes wierp." },
        { q: "Je hoort een luide knal die lijkt op een schot.", keywords: ["ik", "hoorde", "knal"], example: "Ik hoorde dat er een luide knal klonk die geleek op een schot." },
        { q: "Bij de fouillering voel je een vorm die lijkt op een mes bij de broeksband.", keywords: ["ik", "voelde", "mes"], example: "Ik voelde dat er een voorwerp in de vorm van een mes in de broeksband zat." },
        { q: "Je ruikt een brandlucht bij het passeren van de voordeur.", keywords: ["ik", "rook", "brandlucht"], example: "Ik rook dat er een sterke brandlucht uit de woning kwam." },
        { q: "Je ziet dat de bestuurder rode ogen heeft en versuft kijkt.", keywords: ["ik", "zag", "ogen"], example: "Ik zag dat de bestuurder rode ogen had." },
        { q: "Je hoort glas gerinkel aan de achterzijde van het pand.", keywords: ["ik", "hoorde", "glas"], example: "Ik hoorde dat er glas rinkelde aan de achterzijde van het pand." },
        { q: "Tijdens de fouillering voel je een zacht zakje met gruis in de broekzak.", keywords: ["ik", "voelde", "zakje"], example: "Ik voelde dat er een klein zacht zakje in de rechterbroekzak zat." },
        // ... (Aangevuld tot 30 in de logica hieronder)
    ];

    // Dynamische aanvulling voor de demo (vul dit aan met specifieke casussen)
    while(exercises.length < 30) {
        exercises.push({ q: "Extra oefensituatie: Je ziet de verdachte wegrennen.", keywords: ["ik", "zag", "rende"], example: "Ik zag dat de verdachte met versnelde pas wegrende." });
    }

    let current = 0;

    function load() {
        document.getElementById('scenario-text').innerText = exercises[current].q;
        document.getElementById('current-idx').innerText = current + 1;
        document.getElementById('user-input').value = "";
        document.getElementById('feedback').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('user-input').disabled = false;
    }

    function checkAnswer() {
        const input = document.getElementById('user-input').value.toLowerCase();
        const feedback = document.getElementById('feedback');
        const keys = exercises[current].keywords;
        
        let score = 0;
        keys.forEach(k => { if(input.includes(k)) score++; });

        // Check op 'ik heb' (foutieve VTT)
        const isVTT = input.includes("heb") || input.includes("heeft");

        feedback.style.display = "block";
        if (score >= 2 && !isVTT) {
            feedback.className = "correct";
            feedback.innerHTML = "<strong>Goed gedaan!</strong> Je gebruikt de ik-vorm en de verleden tijd.<br><small>Voorbeeld: " + exercises[current].example + "</small>";
        } else {
            feedback.className = "wrong";
            let message = "<strong>Let op:</strong> ";
            if(isVTT) message += "Gebruik geen hulpwerkwoord ('heb'). Schrijf filmisch in de OVT. ";
            if(!input.includes("ik")) message += "Schrijf vanuit de ik-vorm. ";
            message += "<br><small>Probeer: " + exercises[current].example + "</small>";
            feedback.innerHTML = message;
        }
        
        document.getElementById('next-btn').style.display = "inline-block";
        document.getElementById('user-input').disabled = true;
    }

    function nextQuestion() {
        current++;
        if (current < exercises.length) {
            load();
        } else {
            document.getElementById('game-ui').innerHTML = "<h3>Training voltooid!</h3><p>Je hebt alle 30 situaties behandeld. Ga nu aan de slag met een echt proces-verbaal.</p>";
        }
    }

    load();
</script>

</body>
</html>
